<!DOCTYPE html>
{% load static %}


<html>
    <head>
     <meta charset="utf-8">
        <title>PROGDS - APP NO VULNERABLE</title>
        <link rel="icon" type="image/x-icon" href="{% static 'conf/img/favicon.ico' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

        <link rel="stylesheet" type="text/css" href="{% static 'conf/css/base.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'conf/css/forms.css' %}">
        
        {% block headTags %}{% endblock %}
    </head>
    <body>  
	    <div class="container-fluid">
	            {% block logo %}
	            <div class="rounded mx-auto d-block" style="max-width: 200px;">

	            </div>    
	            {% endblock %}
	            {% if messages %}                                           
	                {%include 'conf/messages.html'%}
	            {% endif %}   
	            
	            <main role="main">
                    <div class="container">
                        <div class="row">
                            {% block content %}

                    </div>

	            <div class="pie">

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

	    <script src="{% static 'conf/js/funciones.js' %}" ></script>
	   
	    {% block js %}
	      
	    {% endblock %}
    </body>
</html>
